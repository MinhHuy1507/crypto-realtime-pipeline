apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus_main_ds
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: PostgreSQL
    type: grafana-postgresql-datasource
    uid: postgres_main_ds
    url: postgres:5432
    user: $POSTGRES_USER
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      database: $POSTGRES_DB
      sslmode: "disable"
      postgresVersion: 1300