global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  - job_name: 'spark-driver-streaming'
    static_configs:
      - targets: ['airflow-scheduler:9101']

  - job_name: 'spark-executor-streaming'
    static_configs:
      - targets: ['spark-worker-1:9102']